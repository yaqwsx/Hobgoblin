name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust workspace
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.toml', 'Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --locked --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --locked --workspace

      - name: Validate sample project
        run: |
          cargo run --locked -p hobgoblin-cli -- validate examples/projects/simple_spur_stack.hobgoblin.json \
            --machine examples/library/carvera_air.machine.json \
            --tools examples/library/basic_tools.tools.json \
            --material examples/library/brass.material.json

      - name: Build sample operation graph
        run: |
          cargo run --locked -p hobgoblin-cli -- plan examples/projects/simple_spur_stack.hobgoblin.json \
            --machine examples/library/carvera_air.machine.json \
            --tools examples/library/basic_tools.tools.json \
            --material examples/library/brass.material.json

      - name: Build sample spur shaping debug path
        run: |
          set -o pipefail
          cargo run --locked -p hobgoblin-cli -- debug-spur-path \
            examples/projects/simple_spur_stack.hobgoblin.json \
            feature.spur_20t \
            --stepping adaptive \
            --quality draft \
            --depth-layers 0.25 \
            --machine examples/library/carvera_air.machine.json \
            --tools examples/library/basic_tools.tools.json \
            --material examples/library/brass.material.json \
            | jq '{debug_step_count, move_count, adaptive_steps: .adaptive_rack_stepping.generated_step_count, adaptive_max_error_mm: .adaptive_rack_stepping.estimated_max_error_mm}'

      - name: Simulate sample spur shaping debug path
        run: |
          set -o pipefail
          cargo run --locked -p hobgoblin-cli -- simulate-spur-path \
            examples/projects/simple_spur_stack.hobgoblin.json \
            feature.spur_20t \
            --stepping adaptive \
            --quality draft \
            --depth-layers 0.25 \
            --machine examples/library/carvera_air.machine.json \
            --tools examples/library/basic_tools.tools.json \
            --material examples/library/brass.material.json \
            | jq -e '{errors: [.diagnostics[] | select(.severity == "error")] | length, rapid_segments: .summary.rapid_segment_count, cut_segments: .summary.cut_segment_count} | select(.errors == 0)'

      - name: Export sample Carvera Air G-code
        run: |
          cargo run --locked -p hobgoblin-cli -- export-gcode \
            examples/projects/simple_spur_stack.hobgoblin.json \
            feature.spur_20t \
            examples/exports/simple_spur_stack.nc \
            --report examples/exports/simple_spur_stack.export.json \
            --stepping adaptive \
            --quality draft \
            --depth-layers 0.25 \
            --machine examples/library/carvera_air.machine.json \
            --tools examples/library/basic_tools.tools.json \
            --material examples/library/brass.material.json
          git diff --exit-code -- examples/exports/simple_spur_stack.nc examples/exports/simple_spur_stack.export.json

  json:
    name: JSON examples
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Parse JSON examples
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const files = [
            "examples/projects/simple_spur_stack.hobgoblin.json",
            "examples/projects/invalid/invalid_validation_cases.hobgoblin.json",
            "examples/library/carvera_air.machine.json",
            "examples/library/basic_tools.tools.json",
            "examples/library/brass.material.json",
            "examples/exports/simple_spur_stack.export.json",
          ];
          for (const file of files) {
            JSON.parse(fs.readFileSync(file, "utf8"));
            console.log(`ok ${file}`);
          }
          NODE

  frontend:
    name: Frontend shell
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install browser for UI smoke test
        run: npx playwright install --with-deps chromium

      - name: Run UI smoke test
        run: |
          npm run dev > /tmp/hobgoblin-vite.log 2>&1 &
          echo $! > /tmp/hobgoblin-vite.pid
          trap 'kill "$(cat /tmp/hobgoblin-vite.pid)"' EXIT
          ready=0
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:1420/ >/dev/null; then
              ready=1
              break
            fi
            sleep 1
          done
          test "$ready" -eq 1
          HOBGOBLIN_UI_URL=http://127.0.0.1:1420/?sample=1 npm run test:ui

      - name: Upload UI smoke screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-smoke-screenshot
          path: target/ui-smoke/hobgoblin-ui-smoke.png
          if-no-files-found: ignore
